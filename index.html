<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mia & Leo - juego cooperativo</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <h1>Los Tortolitos - Mia & Leo</h1>
  <h4>hecho por BERRT</h4>
  <div id="nivel-indicador">NIVEL 1</div>

  <div id="contenedor">
    <canvas id="miCanvas"></canvas>

    <!-- Overlay: nivel completado (transición) -->
    <div class="overlay-panel" id="overlay-nivel">
      <p>¡Nivel completado!</p>
      <span class="sub">¡Felicidades Ambos lo lograron!</span>
      <button id="btnSiguiente">Siguiente Nivel</button>
    </div>

    <!-- Overlay: victoria final -->
    <div class="overlay-panel" id="overlay-victoria">
      <p>¡Ganaron!</p>
      <span class="sub">Todos los niveles superados</span>
      <button id="btnReiniciar">Jugar de nuevo</button>
    </div>
  </div>

  <div id="instrucciones">
    <strong style="color: #b8a000;">Leo:</strong> <span>A</span> izquierda | <span>D</span> derecha | <span>W</span> saltar &nbsp;&nbsp;|&nbsp;&nbsp;
    <strong style="color: #cc5fa0;">Mia:</strong> <span>←</span> izquierda | <span>→</span> derecha | <span>↑</span> saltar
  </div>
  <script src="js/script.js"></script>
</body>
</html>
